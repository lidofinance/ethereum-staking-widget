name: Socket.dev checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: socket-scan-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  socket:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Reach uses an npm tool under the hood, so ensure node/npm/npx exist.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Socket Python CLI
        run: |
          python -m pip install --upgrade pip
          pip install socketsecurity

      - name: Socket scan (reach + PR comment, warn-only)
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          socketcli --reach --reach-version 14.12.183 --enable-diff --disable-blocking
